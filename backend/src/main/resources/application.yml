spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  # Render/Railway set PORT; local/docker often use SERVER_PORT
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:changeme-dev-only-secret-key-min-32-chars-long!!}
    expiration-ms: 86400000
  # Danh sách origin CORS (phân tách bằng dấu phẩy). Để trống = chỉ pattern localhost (dev).
  # Production: ví dụ https://app.example.com,https://www.example.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:empdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Hỗ trợ cả DATABASE_URL (Render) và các biến riêng lẻ (Docker)
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:empdb}}
    username: ${DB_USER:emp}
    password: ${DB_PASSWORD:emp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    # Chạy schema.sql sau khi Hibernate cập nhật schema — thêm cột active nếu DB cũ thiếu.
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-docker.sql

---
# Profile cho Render (production)
spring:
  config:
    activate:
      on-profile: render
  datasource:
    # Render cung cấp DATABASE_URL dạng: postgresql://user:pass@host:port/dbname
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-docker.sql

# Logging cho production
logging:
  level:
    root: INFO
    com.utc.employee: INFO
