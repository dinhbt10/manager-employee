services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: empdb
      POSTGRES_USER: emp
      POSTGRES_PASSWORD: emp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emp -d empdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: empdb
      DB_USER: emp
      DB_PASSWORD: emp
      JWT_SECRET: "docker-dev-secret-change-me-at-least-32-chars!!"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
